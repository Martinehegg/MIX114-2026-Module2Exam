<!DOCTYPE html>
<html lang="no">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/listingpage.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;600;700&display=swap" rel="stylesheet" />
  <title>Listingpage</title>
</head>

<body>
  <!-- Navbar-->
  <header>
    <a href="listingpage.html">
      <div class="logo">
        <img src="images/logo.png" alt="" />
      </div>
    </a>
    <nav>
      <ul>
        <li><a href="#karrierer-section">Alle karrierer</a></li>
        <li><a href="comparingpage.html">Sammenlikne karrierer</a></li>
        <li><a href="">Min profil</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero--> 
  <section class="hero">
    <img src="images/hero.png" alt="" />
    <div class="hero-content">
      <h1>Hva vil du bli?</h1>
      <form class="search">
        <input id="searchInput" type="text" placeholder="Søk karriere..." />
      </form>
    </div>
  </section>

  <div class="container">

    <!-- Finn din karrierevei-->
    <section class="karrierer" id="karrierer-section">
      <h1>Finn din karrierevei</h1>
      <button id="filterButton" type="button">Filter</button>
      <div id="filterContainer" class="hidden">
        <select id="filterLevel">
          <option value="">Alle nivåer</option>
        </select>


        <select id="filterFamily">
          <option value="">Alle fagområder</option>
        </select>
      </div>
      <!-- Career cards -->
      <div class="small-cards" id="careerCards">

    </section>
  </div>

  <!-- Footer-->

  <footer>
    <img class="logo" src="images/logo.png" alt="" />
    <p>
      Samarbeid mellom de største universitetene i Norge. (Oslo, Bergen,
      Trondheim, og Tromsø)
    </p>
  </footer>
  <script src="js/listingpage.js"></script>
</body>

</html>
