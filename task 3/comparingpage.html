<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/comparingpage.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Comparingpage</title>
  </head>
  <body>
    <!-- Navbar-->
    <header>
      <a href="listingpage.html"
        ><div class="logo">
          <img src="images/logo.png" alt="" /></div
      ></a>
      <nav>
        <ul>
          <li>
            <a href="listingpage.html#karrierer-section">Alle karrierer</a>
          </li>
          <li><a href="#">Sammenlikne karrierer</a></li>
          <li><a href="">Min profil</a></li>
        </ul>
      </nav>
    </header>

    <div id="careerSelect">
    <select name="" id="career1"></select>
    <select name="" id="career2"></select>
    <button id="compareBtn">Sammenlikn</button>
    </div>
<!-- Add empty table, ready to fill inn with js -->
    <table id="compareTable">
      <tr>
        <th>Kategori</th>
        <th>Karriere 1</th>
        <th>Karriere 2</th>
      </tr>

      <tr>
        <td>Utdanning</td>
        <td id="education1">-</td>
        <td id="education2">-</td>
      </tr>

      <tr>
        <td>Fagområde</td>
        <td id="family1">-</td>
        <td id="family2">-</td>
      </tr>

      <tr>
        <td>Gjennomsnittslønn</td>
        <td id="salary1">-</td>
        <td id="salary2">-</td>
      </tr>

      <tr>
        <td>Antall ansatte</td>
        <td id="employed1">-</td>
        <td id="employed2">-</td>
      </tr>

      <tr>
        <td>Opptakskrav</td>
        <td id="req1">-</td>
        <td id="req2">-</td>
      </tr>
    </table>

    <!-- Footer-->

    <footer>
      <img src="images/logo.png" alt="" />
      <p>
        Samarbeid mellom de største universitetene i Norge. (Oslo, Bergen,
        Trondheim, og Tromsø)
      </p>
    </footer>

    <script src="js/comparingpage.js"></script>
  </body>
</html>
